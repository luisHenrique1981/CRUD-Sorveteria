{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Sorveteria</title>

    <!-- Bootstrap via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light" style="background-color:oklch(64.5% 0.246 16.439);">

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow p-4" style="width: 450px; background-color: oklch(64.5% 0.246 16.439); border:none; color:white;">

            <div class="text-center mb-4">
                <h2>Cadastro</h2>
                <p class="">Crie sua conta na Sorveteria</p>
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="nome" class="form-label">Nome completo</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="nome" 
                        name="nome" 
                        placeholder="Digite seu nome completo"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="email" 
                        name="email" 
                        placeholder="Digite seu e-mail"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label for="telefone" class="form-label">Telefone</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="telefone" 
                        name="telefone" 
                        placeholder="(69) 99999-9999"
                    >
                </div>

                <div class="mb-3">
                    <label for="password1" class="form-label">Senha</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="password1" 
                        name="password1" 
                        placeholder="Crie uma senha"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label for="password2" class="form-label">Confirmar senha</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="password2" 
                        name="password2" 
                        placeholder="Repita sua senha"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Cadastrar
                </button>

                <div class="text-center mt-3">
                    <small>
                        Já tem conta?
                        <a href="{% url 'login' %}">Entrar</a>
                    </small>
                </div>
            </form>

        </div>
    </div>

</body>
</html>

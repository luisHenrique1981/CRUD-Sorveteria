{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Sorveteria</title>

    <!-- Bootstrap via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100 ">
        <div class="card shadow p-4" style="width: 400px; background-color: oklch(64.5% 0.246 16.439); border:none; color:white;">

            <div class="text-center mb-4">
                <h2>Login</h2>
                <p>Acesse sua conta</p>
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="username" class="form-label">Usuário</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Digite seu usuário">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Digite sua senha">
                </div>

                <li class="nav-item" style="list-style: none;"><a class="nav-link" href="{% url 'cadastro' %}">Cadastrar-se</a></li>

                <button type="submit" class="btn btn-primary w-100">
                    Entrar
                </button>
            </form>

        </div>
    </div>

</body>
</html>
